<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Partner 1 & Partner 2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Kindly Respond</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="our-story.html">Our Story</a>
                <a href="rsvp.html" class="active">RSVP</a>
                <a href="registry.html">Registry</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="rsvp-content">
            <h2>We can't wait to see you!</h2>
            <p>Please let us know if you can make it by July 1st, 2026.</p>
            
            <!-- The Native Form -->
            <form id="rsvp-form" class="custom-form">
                
                <div class="form-group">
                    <label for="guest-name">Guest Name(s)</label>
                    <input type="text" id="guest-name" name="Name" placeholder="e.g., Jane & John Doe" required>
                </div>

                <div class="form-group">
                    <label>Will you be attending?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="Attendance" value="Joyfully Accepts" required>
                            <span>Joyfully Accepts</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="Attendance" value="Regretfully Declines">
                            <span>Regretfully Declines</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-button">Send RSVP</button>
            </form>

            <!-- Success Message (Hidden until submitted) -->
            <div id="form-message" class="success-message" style="display: none;">
                <h3>Thank you!</h3>
                <p>Your response has been recorded.</p>
            </div>

        </section>
    </main>

    <footer>
        <p>Questions? Contact us at hello@ourwedding.com</p>
    </footer>

    <!-- Form Submission Script -->
    <script>
        const form = document.getElementById('rsvp-form');
        const messageDiv = document.getElementById('form-message');
        const submitBtn = document.getElementById('submit-button');

        // This is the URL we will get from Google Sheets in the next step
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzQHsXaCnk76s__TIfsLKf7umTjFW3P0RieRuI0jbluPCSrvoKA_34Va9FPsyijt1wjMw/exec'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.innerText = "Sending...";
            
            // Collect form data
            const requestBody = new FormData(form);
            
            // Send to Google Sheets
            fetch(scriptURL, { method: 'POST', body: requestBody })
                .then(response => {
                    form.style.display = 'none';
                    messageDiv.style.display = 'block';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.innerText = "Error - Try Again";
                });
        });
    </script>
</body>
</html>
