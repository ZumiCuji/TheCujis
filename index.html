<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding | Welcome</title>
    <!-- Link to our stylesheet for the rest of the site -->
    <link rel="stylesheet" href="style.css">
    <!-- Import BOHO/Modern Fonts & Cursive Font for the Reveal -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Alex+Brush&display=swap" rel="stylesheet">
    
    <!-- INLINE STYLES -->
    <style>
        /* The full-screen background */
        .curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Default image for laptops/desktops */
            background-image: url('images/monet.jpg');
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.5s ease;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        /* A subtle dark tint over the painting so the white text pops */
        .curtain-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25); 
            z-index: -1;
        }

        /* Centers text over the painting */
        .curtain-content {
            text-align: center;
            z-index: 1;
            width: 90%; 
        }

        /* The Names */
        .cursive-names {
            font-family: 'Alex Brush', cursive !important;
            font-size: 8vw; /* Scales automatically with window width */
            color: #ffffff;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.6);
            margin: 0 0 0.5rem 0;
            line-height: 1.1;
            font-weight: normal;
        }

        /* Click to enter text - Much smaller, same font */
        .enter-text {
            font-family: 'Alex Brush', cursive !important;
            font-size: 1.5vw; /* Reduced significantly for desktop */
            color: #ffffff;
            text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.6);
            animation: pulse 2.5s infinite;
            margin: 0;
            font-weight: normal;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .curtain-open {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* =========================================
           MOBILE PHONE SETTINGS (Screens smaller than 768px)
           ========================================= */
        @media (max-width: 768px) {
            .curtain-overlay {
                /* Swaps to the tall image for phones! */
                background-image: url('images/monet-mobile.jpg');
            }
            
            /* Adjust text sizes for small screens */
            .cursive-names { 
                font-size: 16vw; 
            }
            .enter-text { 
                font-size: 3.5vw; /* Reduced significantly for mobile */
                margin-top: 0.5rem; 
            }
        }
    </style>
</head>
<body>

    <!-- 🎨 THE FULL-SCREEN CURTAIN REVEAL OVERLAY -->
    <div id="curtain" class="curtain-overlay">
        <div class="curtain-content">
            <h1 class="cursive-names">Morgan & Zumi</h1>
            <p class="enter-text">Click to Enter</p>
        </div>
    </div>

    <!-- Header & Navigation -->
    <header>
        <div class="header-content">
            <h1>The Cujis</h1>
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="our-story.html">Our Story</a>
                <a href="rsvp.html">RSVP</a>
                <a href="registry.html">Registry</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <section class="hero">
            <img src="images/hero-photo.jpg" alt="A lovely photo of the couple" class="framed-photo">
        </section>

        <section class="welcome-text">
            <h2>Welcome to our Beginning</h2>
            <p>We are so excited to celebrate our special day with our favorite people.</p>
            <p class="date-highlight">May 03, 2027 • Raleigh, NC</p>
        </section>
    </main>

    <footer>
        <p>1 Corinthians 13:4-8</p>
    </footer>

    <!-- Script to trigger the curtain reveal -->
    <script>
        document.getElementById('curtain').addEventListener('click', function() {
            this.classList.add('curtain-open');
        });
    </script>

</body>
</html>
