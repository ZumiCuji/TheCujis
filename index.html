<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding | Welcome</title>
    <!-- Link to our stylesheet for the rest of the site -->
    <link rel="stylesheet" href="style.css">
    <!-- Import BOHO/Modern Fonts & Cursive Font for the Reveal -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Alex+Brush&display=swap" rel="stylesheet">
    
    <!-- INLINE STYLES -->
    <style>
        /* The "White Wall" behind the painting */
        .curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff; /* Fills the extra space with white */
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.5s ease;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        /* The container holding the painting and the text */
        .painting-container {
            position: relative;
            max-width: 95vw; /* Keeps a small white border on the edges */
            max-height: 95vh;
            display: inline-block;
        }

        /* Forces the image to keep its original dimensions without blurring */
        .monet-img {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            display: block;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15); /* Adds a soft elegant shadow */
        }

        /* Controls which image shows up based on screen size */
        .desktop-img { display: block; }
        .mobile-img { display: none; }

        /* A subtle dark tint ONLY over the painting so the white text pops */
        .painting-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        /* Centers text over the painting */
        .curtain-content {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2; /* Places text above the tint */
            width: 90%; /* Ensures text doesn't hit the edges of the painting */
        }

        /* ALL Cursive Text Styling */
        .cursive-names {
            font-family: 'Alex Brush', cursive !important;
            font-size: 6vw; /* Scales automatically with window width! */
            color: #ffffff;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
            margin: 0;
            line-height: 1.2;
        }

        .enter-text {
            font-family: 'Alex Brush', cursive !important;
            font-size: 3vw; /* Scales automatically */
            color: #ffffff;
            text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.5);
            animation: pulse 2.5s infinite;
            margin-top: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .curtain-open {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* =========================================
           MOBILE PHONE SETTINGS
           ========================================= */
        @media (max-width: 768px) {
            .desktop-img { display: none; } /* Hide wide painting */
            .mobile-img { display: block; } /* Show tall painting */
            
            /* Make text much larger on small screens so it's readable */
            .cursive-names { font-size: 13vw; }
            .enter-text { font-size: 7vw; margin-top: 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- 🎨 THE NEW CURTAIN REVEAL OVERLAY -->
    <div id="curtain" class="curtain-overlay">
        <div class="painting-container">
            
            <!-- Desktop Image (Wide) -->
            <img src="images/monet.jpg" class="monet-img desktop-img" alt="Monet Painting">
            
            <!-- Mobile Image (Tall) -->
            <img src="images/monet-mobile.jpg" class="monet-img mobile-img" alt="Monet Painting Mobile">
            
            <div class="curtain-content">
                <h1 class="cursive-names">Morgan & Zumi</h1>
                <p class="enter-text">Click to enter</p>
            </div>
            
        </div>
    </div>

    <!-- Header & Navigation -->
    <header>
        <div class="header-content">
            <h1>The Cujis</h1>
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="our-story.html">Our Story</a>
                <a href="rsvp.html">RSVP</a>
                <a href="registry.html">Registry</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>
        <section class="hero">
            <img src="images/hero-photo.jpg" alt="A lovely photo of the couple" class="framed-photo">
        </section>

        <section class="welcome-text">
            <h2>Welcome to our Beginning</h2>
            <p>We are so excited to celebrate our special day with our favorite people.</p>
            <p class="date-highlight">May 03, 2027 • Raleigh, NC</p>
        </section>
    </main>

    <footer>
        <p>1 Corinthians 13:4-8</p>
    </footer>

    <!-- Script to trigger the curtain reveal -->
    <script>
        document.getElementById('curtain').addEventListener('click', function() {
            this.classList.add('curtain-open');
        });
    </script>

</body>
</html>
